name: Skibidi_tualet_poop

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gather-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Fetcher Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pyyaml

      - name: Run VLESS Fetcher v2
        run: |
          python -u fetcher.py

      - name: Push Clean Chunks to Repository
        run: |
          git config --local user.email "fetcher_bot@github.com"
          git config --local user.name "VLESS Chunker Bot"
          git pull origin main --rebase
          git add raw_chunks/chunk_*.txt core/*.json logs/*.txt output/*.txt output/stats.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update clean chunks [skip ci]" && git push)
