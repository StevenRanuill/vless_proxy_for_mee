name: Skibidi_tualet_proxy
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gather-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Fetcher Script
        run: python fetcher.py

      - name: Upload Raw Chunks Folder
        uses: actions/upload-artifact@v4
        with:
          name: raw-chunks-artifact
          path: raw_chunks/
          retention-days: 1

  test-data:
    needs: gather-data
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Raw Chunks
        uses: actions/download-artifact@v4
        with:
          name: raw-chunks-artifact
          path: raw_chunks/

      - name: Run Checker Script on PC
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          "C:\\pythoncore-3.14-64\\python.exe" "C:\Proxy\vless_proxy_for_mee\checker.py"
        continue-on-error: true

      - name: Sync sub-files back to GitHub
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          
          cd /d "C:\actions-runner\_work\vless_proxy_for_mee\vless_proxy_for_mee"
          
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          git add my_sub.txt
          git add parser_log.txt           # <--- НОВАЯ СТРОКА: сохраняем лог проверок на GitHub
          git add history_blacklist.json
          
          git status
          
          git commit --allow-empty -m "Auto-update subscriptions and history blacklist [skip ci]"
          git push origin main
