name: Skibidi_tualet_proxy 
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gather-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Fetcher Script
        run: python fetcher.py

      - name: Upload Raw Chunks Folder
        uses: actions/upload-artifact@v4
        with:
          name: raw-chunks-artifact
          path: raw_chunks/   # Передаем всю папку с мелкими пачками нод

  test-data:
    needs: gather-data
    runs-on: self-hosted # Передача задачи на ваш локальный ПК
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Raw Chunks
        uses: actions/download-artifact@v4
        with:
          name: raw-chunks-artifact
          path: raw_chunks/   # Скачиваем структуру папок обратно

      - name: Run Checker Script on PC
        shell: cmd
        # Исправление кодировки консоли Windows + явное указание кодировки для Python
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          "C:\\pythoncore-3.14-64\\python.exe" -m pip install aiohttp
          "C:\\pythoncore-3.14-64\\python.exe" checker.py
        continue-on-error: true

      - name: Sync sub-files back to GitHub
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add output/*.txt
          git commit -m "Auto-update subscriptions via Home PC-runner"
          git push origin main
