name: Skibidi_tualet_proxy
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gather-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies for Fetcher
        run: |
          python -m pip install --upgrade pip
          python -m pip install aiohttp

      # КРИТИЧЕСКИЙ ФИКС: Принудительно чистим логи и чанки перед новым нарезанием в облаке
      - name: Create Structure Directories
        run: |
          rm -rf logs/*
          rm -rf raw_chunks/*
          mkdir -p logs core subs raw_chunks

      - name: Run Fetcher & Light Check
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u fetcher.py

      - name: Push Raw Chunks to Repository
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add raw_chunks/* logs/* core/* || true
          git commit --allow-empty -m "Deploy fresh pre-filtered chunks [skip ci]"
          git push origin main

  test-data:
    needs: gather-data
    runs-on: self-hosted
    timeout-minutes: 60   
    steps:
      - name: Hard Reset Network State and Pull Data
        shell: cmd
        run: |
          ping 127.0.0.1 -n 16 >nul
          ipconfig /flushdns
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git reset --hard origin/main
          git pull origin main

      # КРИТИЧЕСКИЙ ФИКС: Запуск чекера ИНДИВИДУАЛЬНО НА КАЖДЫЙ файл чанка через Windows CMD цикл
      - name: Run Deep Checker Script File by File
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        run: |
          chcp 65001
          if not exist subs mkdir subs
          
          echo Начинаем поблочный обход чанков...
          for %%F in (raw_chunks\chunk_*.txt) do (
              echo --------------------------------------------------
              echo Обработка файла: %%F
              "C:\pythoncore-3.14-64\python.exe" -u "C:\Proxy\vless_proxy_for_mee\checker.py" --file "%%F"
              ping 127.0.0.1 -n 3 >nul
          )
        continue-on-error: true

      - name: Sync sub-files back to GitHub
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          ping 127.0.0.1 -n 16 >nul
          ipconfig /flushdns
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          if exist subs git add subs/
          if exist logs git add logs/
          if exist core git add core/
          git status
          git commit --allow-empty -m "Auto-update deep-checked structured files including my_sub [skip ci]"
          git push origin main || (ping 127.0.0.1 -n 10 >nul && ipconfig /flushdns && git push origin main)
