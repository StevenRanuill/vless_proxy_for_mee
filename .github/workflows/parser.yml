name: VLESS Fetcher Parser


on:

  # запуск вручную
  workflow_dispatch:


  # автоматический запуск
  schedule:

    # каждые 6 часов
    - cron: "0 */6 * * *"


  # запуск после изменений
  push:

    branches:

      - main



jobs:


  gather-data:


    name: Gather VLESS Nodes

    runs-on: ubuntu-latest


    steps:


      # ------------------------------------------------
      # Checkout
      # ------------------------------------------------

      - name: Checkout Repository

        uses: actions/checkout@v4

        with:

          fetch-depth: 0



      # ------------------------------------------------
      # Python
      # ------------------------------------------------

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"



      # ------------------------------------------------
      # Install dependencies
      # ------------------------------------------------

      - name: Install Requirements

        run: |

          python -m pip install --upgrade pip

          pip install requests pyyaml tqdm beautifulsoup4



      # ------------------------------------------------
      # Run fetcher
      # ------------------------------------------------

      - name: Run VLESS Fetcher

        run: |

          python fetcher.py



      # ------------------------------------------------
      # Show statistics
      # ------------------------------------------------

      - name: Display Result

        run: |

          echo "========== RESULT =========="

          cat output/stats.json

          echo "============================"



      # ------------------------------------------------
      # Commit results
      # ------------------------------------------------

      - name: Commit Updated Lists

        run: |


          git config user.name "github-actions"

          git config user.email "actions@github.com"


          git add output/


          git diff --cached --quiet || git commit -m "Update VLESS nodes"



      # ------------------------------------------------
      # Push changes
      # ------------------------------------------------

      - name: Push Changes

        uses: ad-m/github-push-action@v0.8.0

        with:

          github_token: ${{ secrets.GITHUB_TOKEN }}

          branch: main



      # ------------------------------------------------
      # Save artifacts
      # ------------------------------------------------

      - name: Upload Results

        uses: actions/upload-artifact@v4

        with:

          name: vless-results

          path:

            output/
