name: Update VLESS subscriptions

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

  push:
    branches:
      - main
      - master

    paths:
      - "fetcher.py"
      - "sources.yml"
      - "config/**"
      - "requirements.txt"
      - ".github/workflows/parser.yml"


permissions:
  contents: write


concurrency:
  group: vless-parser
  cancel-in-progress: false


jobs:
  parser:

    name: Fetch and parse VLESS subscriptions

    runs-on: ubuntu-latest

    timeout-minutes: 30


    steps:

      # ------------------------------------------------------
      # Checkout
      # ------------------------------------------------------

      - name: Checkout repository

        uses: actions/checkout@v4

        with:
          fetch-depth: 0


      # ------------------------------------------------------
      # Python
      # ------------------------------------------------------

      - name: Setup Python

        uses: actions/setup-python@v5

        with:
          python-version: "3.12"

          cache: pip


      # ------------------------------------------------------
      # Dependencies
      # ------------------------------------------------------

      - name: Install dependencies

        shell: bash

        run: |

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi


      # ------------------------------------------------------
      # Prepare directories
      # ------------------------------------------------------

      - name: Prepare directories

        shell: bash

        run: |

          mkdir -p output
          mkdir -p output/chunks


      # ------------------------------------------------------
      # Run parser
      # ------------------------------------------------------

      - name: Run VLESS parser

        shell: bash

        env:
          PYTHONUNBUFFERED: "1"

        run: |

          python fetcher.py


      # ------------------------------------------------------
      # Validate output
      # ------------------------------------------------------

      - name: Validate parser output

        shell: bash

        run: |

          echo "Generated files:"

          find output \
            -type f \
            -maxdepth 3 \
            -print \
            -exec wc -l {} \;


      # ------------------------------------------------------
      # Show changes
      # ------------------------------------------------------

      - name: Check repository changes

        shell: bash

        run: |

          git status --short


      # ------------------------------------------------------
      # Commit changes
      # ------------------------------------------------------

      - name: Commit updated subscriptions

        shell: bash

        run: |

          git config user.name "github-actions[bot]"

          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"


          git add output/


          if git diff --cached --quiet; then

            echo "No changes detected."

            exit 0

          fi


          git commit \
            -m "chore: update VLESS subscriptions"


          git push
