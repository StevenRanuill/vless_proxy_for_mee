name: Skibidi_tualet_proxy
on:
  schedule:
    - cron: '0 0 * * *' # Автоматический запуск каждый день в полночь
  workflow_dispatch: # Возможность ручного запуска кнопкой

permissions:
  contents: write
  actions: write # Разрешение на принудительное убийство процесса воркфлоу

jobs:
  # ЭТАП 0: Проверка доступности домашнего ПК и аварийный стоп
  check-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Check Self-Hosted Runner Status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Запрашиваем статус локального раннера через GitHub API..."
          
          # Получаем статус self-hosted раннера
          STATUS=$(gh api repos/${{ github.repository }}/actions/runners --jq '.runners[] | select(.labels[].name == "self-hosted") | .status' | head -n 1)
          
          if [ -z "$STATUS" ]; then
            STATUS="offline"
          fi
          
          echo "Текущий статус раннера: $STATUS"
          
          if [ "$STATUS" = "offline" ]; then
            echo "[АВАРИЙНЫЙ ВЫХОД] Домашний ПК выключен. Убиваем текущий процесс воркфлоу..."
            # GitHub CLI для отмены текущего запуска
            gh run cancel ${{ github.run_id }}
            
            sleep 10
            exit 1
          fi

  # ЭТАП 1: Сбор данных в облаке (Запустится только если ПК прошел проверку)
  gather-data:
    needs: check-runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies for Fetcher
        run: |
          python -m pip install --upgrade pip
          python -m pip install aiohttp
      - name: Create Structure Directories
        run: |
          rm -rf logs/*
          rm -rf raw_chunks/*
          mkdir -p logs core subs raw_chunks
      - name: Run Fetcher & Light Check
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u fetcher.py
      - name: Push Raw Chunks to Repository
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add raw_chunks/* logs/* core/* || true
          git commit --allow-empty -m "Deploy fresh pre-filtered chunks [skip ci]"
          git push origin main

  # ЭТАП 2: Основательная поблочная проверка на домашнем ПК
  test-data:
    needs: gather-data
    runs-on: self-hosted
    timeout-minutes: 60 
    steps:
      - name: Hard Reset Network State and Pull Data
        shell: cmd
        run: |
          ipconfig /flushdns
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git reset --hard origin/main
          git pull origin main

      - name: Run Deep Checker Script File by File
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        run: |
          chcp 65001
          if not exist subs mkdir subs
          
          echo === Начинаем пофайловый обход чанков через Xray Core ===
          for %%F in (raw_chunks\chunk_*.txt) do (
              echo --------------------------------------------------
              echo [ПРОЦЕСС] Обработка файла: %%F
              
              :: Переменная "%%F" обязательно берется в кавычки для защиты аргументов
              "C:\pythoncore-3.14-64\python.exe" -u "C:\Proxy\vless_proxy_for_mee\checker.py" --file "%%F"
              
              ping 127.0.0.1 -n 3 >nul
          )


      - name: Sync sub-files back to GitHub
        shell: cmd
        run: |
          echo === Очистка зависшего сетевого стека Windows ===
          ipconfig /flushdns >nul 2>&1
          
          echo === Сброс старых тормозящих настроек Git ===
          :: Сбрасываем бесконечные таймауты, которые заставляли пуш зависать
          git config --global --unset http.lowSpeedLimit || true
          git config --global --unset http.lowSpeedTime || true
          
          :: Настраиваем жесткий и быстрый лимит: если пуш тупит дольше 15 секунд - перезапустить
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 15
          
          :: Отключаем буферизацию (актуально для Windows раннеров)
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
          
          echo === Добавление файлов и коммит ===
          if exist subs git add subs/
          if exist logs git add logs/
          if exist core git add core/
          
          git commit --allow-empty -m "Auto-update deep-checked structured files including my_sub [skip ci]"
          
          echo === Быстрый пуш в репозиторий ===
          :: Флаг --quiet отключает отрисовку логов, что экономит кучу времени в Windows CLI
          git push --quiet origin main

