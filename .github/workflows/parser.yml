name: Skibidi_tualet_proxy
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gather-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies for Fetcher
        run: |
          python -m pip install --upgrade pip
          python -m pip install aiohttp

      - name: Run Fetcher Script
        run: python fetcher.py

      # Передаем ВСЕ сгенерированные файлы на стадиях, чтобы ПК мог их закоммитить
      - name: Upload Workspace Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-data-artifact
          path: |
            raw_chunks/
            01_raw_all_downloaded.txt
            02_raw_unique_deduplicated.txt
            all_gathered_raw.txt
            history_blacklist.json
          if-no-files-found: error
          retention-days: 1


  test-data:
    needs: gather-data
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Скачиваем чанки и сгенерированные фетчером логи прямо в корень воркспейса на ПК
      - name: Download Proxy Data
        uses: actions/download-artifact@v4
        with:
          name: proxy-data-artifact
          path: .

      # Гарантируем наличие необходимых библиотек в вашем Windows Python перед тестом
      - name: Install Dependencies on PC
        shell: cmd
        run: |
          "C:\pythoncore-3.14-64\python.exe" -m pip install --upgrade pip
          "C:\pythoncore-3.14-64\python.exe" -m pip install aiohttp

      # Запускаем чекер. Скрипт должен лежать в репозитории (или вызываться из рабочей папки раннера)
      - name: Run Checker Script on PC
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          "C:\pythoncore-3.14-64\python.exe" checker.py
        continue-on-error: true

      - name: Sync sub-files back to GitHub
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          :: Принудительно добавляем только существующие файлы, чтобы Гит не падал
          if exist 01_raw_all_downloaded.txt git add 01_raw_all_downloaded.txt
          if exist 02_raw_unique_deduplicated.txt git add 02_raw_unique_deduplicated.txt
          if exist all_gathered_raw.txt git add all_gathered_raw.txt
          if exist my_sub.txt git add my_sub.txt
          if exist parser_log.txt git add parser_log.txt
          if exist history_blacklist.json git add history_blacklist.json
          
          git status
          git commit --allow-empty -m "Auto-update multi-stage logs and subscriptions [skip ci]"
          git push origin main
