name: Skibidi_tualet_proxy
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gather-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies for Fetcher
        run: |
          python -m pip install --upgrade pip
          python -m pip install aiohttp

      - name: Create Structure Directories
        run: mkdir -p logs core subs

      - name: Run Fetcher Script
        run: python fetcher.py

      - name: Upload Workspace Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: proxy-data-artifact
          # ИСПРАВЛЕНО: Явно перечисляем пути, включая файлы внутри папок
          path: |
            raw_chunks/
            logs/
            core/
          if-no-files-found: error
          retention-days: 1

  test-data:
    needs: gather-data
    runs-on: self-hosted
    timeout-minutes: 15 # ИСПРАВЛЕНО: Жесткий лимит. Больше воркфлоу никогда не зависнет бесконечно
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5


      # Жёсткий сброс сети средствами Windows перед обращением к GitHub API
      - name: Force Clean Network State
        shell: cmd
        run: |
          ipconfig /flushdns
          netsh interface ipv4 set dns name="Ethernet" static 1.1.1.1 primary
          ping 127.0.0.1 -n 3 >nul
        continue-on-error: true # Если имя адаптера не "Ethernet", шаг просто пропустится

      - name: Download Proxy Data
        uses: actions/download-artifact@v5
        with:
          name: proxy-data-artifact
          path: .


      # ИСПРАВЛЕНО: Защита от зависших сетевых сокетов на Windows-машине ранера
      - name: Flush DNS and Reset Network Sockets
        shell: cmd
        run: |
          ipconfig /flushdns
          ping 127.0.0.1 -n 3 >nul


      - name: Download Proxy Data
        uses: actions/download-artifact@v5
        with:
          name: proxy-data-artifact
          # ИСПРАВЛЕНО: Скачиваем строго в корень воркспейса
          path: .

      - name: Install Dependencies on PC
        shell: cmd
        run: |
          "C:\pythoncore-3.14-64\python.exe" -m pip install --upgrade pip
          "C:\pythoncore-3.14-64\python.exe" -m pip install aiohttp

      - name: Run Checker Script on PC
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          if not exist logs mkdir logs
          if not exist subs mkdir subs
          "C:\pythoncore-3.14-64\python.exe" "C:\Proxy\vless_proxy_for_mee\checker.py"
        continue-on-error: true

      - name: Sync sub-files back to GitHub
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          :: ИСПРАВЛЕНО: Убран Bash-слеш экранирования для CMD Windows
          if exist subs git add subs/*
          if exist logs git add logs/*
          if exist core git add core/*
          
          git status
          git commit --allow-empty -m "Auto-update organized proxy structure [skip ci]"
          git push origin main
