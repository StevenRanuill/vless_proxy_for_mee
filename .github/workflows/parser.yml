name: Skibidi_tualet_proxy

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Check Self-Hosted Runner Status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Запрашиваем статус локального раннера..."
          STATUS=$(gh api repos/${{ github.repository }}/actions/runners --jq '.runners[] | select(.labels[].name == "self-hosted") | .status' | head -n 1)
          if [ -z "$STATUS" ]; then
            STATUS="offline"
          fi
          echo "Текущий статус раннера: $STATUS"
          if [ "$STATUS" = "offline" ]; then
            echo "[АВАРИЙНЫЙ ВЫХОД] Домашний ПК выключен."
            gh run cancel ${{ github.run_id }}
            sleep 10
            exit 1
          fi

  gather-data:
    needs: check-runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install aiohttp
      - name: Clean Old Chunks
        run: |
          rm -rf raw_chunks/* logs/*
          mkdir -p logs core subs raw_chunks
      - name: Run Fetcher
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u fetcher.py
      - name: Push Raw Chunks
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add raw_chunks/* logs/* core/* || true
          git commit --allow-empty -m "Deploy fresh pre-filtered chunks [skip ci]"
          git push origin main

  test-data:
    needs: gather-data
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Fix Git safe.directory (Global)
        shell: cmd
        run: |
          echo === Глобальное исправление Git безопасной директории ===
          git config --global --add safe.directory "*"
          git config --global --add safe.directory "C:/Proxy/vless_proxy_for_mee"
          echo Текущие настройки Git:
          git config --global --list | findstr safe
          echo Готово
      
      - name: Hard Reset and Pull
        shell: cmd
        run: |
          echo === Сброс и обновление репозитория ===
          cd C:\actions-runner\_work\vless_proxy_for_mee\vless_proxy_for_mee
          git config --global --add safe.directory "*"
          ipconfig /flushdns
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git reset --hard origin/main
          git pull origin main
          echo Репозиторий обновлен
      
      - name: Create directories
        shell: cmd
        run: |
          echo === Создание директорий ===
          git config --global --add safe.directory "*"
          if not exist subs mkdir subs
          if not exist logs mkdir logs
          if not exist raw_chunks mkdir raw_chunks
          echo Директории созданы
      
      - name: Run Checker
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"
        run: |
          chcp 65001 >nul
          echo === Начинаем пофайловый обход чанков через Xray Core ===
          for %%F in (raw_chunks\chunk_*.txt) do (
            echo [ПРОЦЕСС] Обработка файла: %%F
            "C:\pythoncore-3.14-64\python.exe" -u "C:\Proxy\vless_proxy_for_mee\checker.py" --file "%%F"
            ping 127.0.0.1 -n 3 >nul
          )
      
      - name: Sync sub-files back
        shell: cmd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo === Синхронизация результатов ===
          git config --global --add safe.directory "*"
          ipconfig /flushdns >nul 2>&1
          if exist subs git add subs/ || echo Нет папки subs
          if exist logs git add logs/ || echo Нет папки logs
          if exist core git add core/ || echo Нет папки core
          git commit --allow-empty -m "Auto-update deep-checked structured files [skip ci]"
          git push https://x-access-token:%GITHUB_TOKEN%@github.com/${{ github.repository }}.git main --force-with-lease
      
      - name: Post-Run Clean
        shell: cmd
        if: always()
        run: |
          echo === Удаление отработанных чанков ===
          git config --global --add safe.directory "*"
          if exist raw_chunks del /q raw_chunks\* 2>nul
          echo === Локальный ПК очищен! ===
