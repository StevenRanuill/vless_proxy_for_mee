name: Skibidi_tualet_proxy
on:
  schedule:
    - cron: '0 0 * * *' # Автоматический запуск раз в сутки в 03:00 по МСК
  workflow_dispatch: # Кнопка ручного запуска на сайте GitHub

permissions:
  contents: write

jobs:
  gather-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Fetcher Script
        run: python fetcher.py

      - name: Upload Raw Chunks Folder
        uses: actions/upload-artifact@v4
        with:
          name: raw-chunks-artifact
          path: raw_chunks/
          if-no-files-found: error
          retention-days: 1

  test-data:
    needs: gather-data
    runs-on: self-hosted # Передача задачи на ваш ПК
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Raw Chunks
        uses: actions/download-artifact@v4
        with:
          name: raw-chunks-artifact
          path: raw_chunks/

      - name: Run Checker Script on PC
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          "C:\\pythoncore-3.14-64\\python.exe" -m pip install aiohttp
          "C:\\pythoncore-3.14-64\\python.exe" "C:\Proxy\vless_proxy_for_mee\checker.py"
        continue-on-error: true

      - name: Sync sub-files back to GitHub
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          
          :: 1. Жестко принуждаем консоль Windows зайти в физическую папку репозитория
          cd /d "C:\actions-runner\_work\vless_proxy_for_mee\vless_proxy_for_mee"
          
          :: 2. Настраиваем пользователя для текущего коммита
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          :: 3. Добавляем файлы напрямую по их локальным именам без переменных окружения
          git add my_sub.txt
          git add output/*.txt
          git add history_blacklist.json
          
          :: 4. Выводим статус в лог, чтобы вы глазами увидели, зацепил ли Git изменения
          git status
          
          :: 5. Делаем коммит и отправляем его на сервер
          git commit --allow-empty -m "Auto-update subscriptions and history blacklist [skip ci]"
          git push origin main
