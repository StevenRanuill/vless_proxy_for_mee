name: Skibidi_tualet_proxy
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gather-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies for Fetcher
        run: |
          python -m pip install --upgrade pip
          python -m pip install aiohttp

      - name: Create Structure Directories
        run: mkdir -p logs core subs

      - name: Run Fetcher Script
        run: python fetcher.py

      # ИСПРАВЛЕНО: Вместо артефактов пушим чанки прямо в ветку
      - name: Push Raw Chunks to Repository
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add raw_chunks/* logs/* core/* || true
          git commit --allow-empty -m "Deploy raw chunks for local PC checking [skip ci]"
          git push origin main

  test-data:
    needs: gather-data
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      # ИСПРАВЛЕНО: Кулдаун сети и жесткий pull свежих чанков из репозитория
      - name: Hard Reset Network State and Pull Data
        shell: cmd
        run: |
          echo Ожидание восстановления сети Windows...
          ping 127.0.0.1 -n 16 >nul
          ipconfig /flushdns
          
          :: Настраиваем гит на селф-хостед машине
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          :: Сбрасываем локальные изменения (если были) и принудительно стягиваем чанки
          git reset --hard origin/main
          git pull origin main

      - name: Install Dependencies on PC
        shell: cmd
        run: |
          "C:\pythoncore-3.14-64\python.exe" -m pip install --upgrade pip
          "C:\pythoncore-3.14-64\python.exe" -m pip install aiohttp

      - name: Run Checker Script on PC
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          if not exist logs mkdir logs
          if not exist subs mkdir subs
          "C:\pythoncore-3.14-64\python.exe" "C:\Proxy\vless_proxy_for_mee\checker.py"
        continue-on-error: true

      # Пуш результатов инкрементальных подписок обратно в ваш репозиторий
      - name: Sync sub-files back to GitHub
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001
          
          :: Пауза 15 секунд для закрытия сокетов Windows
          ping 127.0.0.1 -n 16 >nul
          ipconfig /flushdns
          
          :: Отключаем тайм-ауты гит
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 999999
          
          :: Надежный способ добавления директорий в CMD
          if exist subs git add subs/
          if exist logs git add logs/
          if exist core git add core/
          
          git status
          git commit --allow-empty -m "Auto-update organized proxy structure [skip ci]"
          
          echo Начинаем отправку результатов в репозиторий...
          git push origin main || (ping 127.0.0.1 -n 10 >nul && ipconfig /flushdns && git push origin main)
