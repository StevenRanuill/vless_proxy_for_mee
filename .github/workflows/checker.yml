name: Skibidi_tualet_proxy — Checker

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"


jobs:

  checker:

    name: Check VLESS proxies

    runs-on: self-hosted


    steps:

      # ---------------------------------
      # Получаем код
      # ---------------------------------

      - name: Checkout repository

        uses: actions/checkout@v4

        with:

          clean: true4


      # ---------------------------------
      # Python
      # ---------------------------------

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"



      # ---------------------------------
      # Зависимости
      # ---------------------------------

      - name: Install requirements

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt



      # ---------------------------------
      # Проверка окружения
      # ---------------------------------

      - name: Check Xray

        shell: powershell

        run: |

          .\Xray\xray.exe version



      # ---------------------------------
      # Запуск checker
      # ---------------------------------

      - name: Run checker

        shell: powershell

        run: |

          python checker.py
